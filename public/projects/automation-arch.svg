<svg width="800" height="500" viewBox="0 0 800 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="grad_orange" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(400 250) rotate(90) scale(300 480)">
      <stop stop-color="#f59e0b" stop-opacity="0.1"/>
      <stop offset="1" stop-color="#0A0A0A" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="800" height="500" fill="#0A0A0A"/>
  <rect width="800" height="500" fill="url(#grad_orange)"/>

  <!-- WORKFLOW GRID -->
  <g opacity="0.2">
    <path d="M0 0 L800 500 M800 0 L0 500" stroke="#f59e0b" stroke-width="0.5"/>
    <circle cx="400" cy="250" r="200" fill="none" stroke="#f59e0b" stroke-width="0.5" stroke-dasharray="10 10"/>
  </g>

  <!-- NODES -->
  <g>
    <!-- Triggers -->
    <rect x="50" y="220" width="120" height="60" rx="12" fill="#1A1A1A" stroke="#f59e0b" stroke-width="2"/>
    <text x="110" y="255" fill="#f59e0b" font-family="sans-serif" font-size="11" font-weight="bold" text-anchor="middle">WEBHOOK</text>

    <!-- Logic Hub -->
    <rect x="250" y="150" width="300" height="200" rx="20" fill="#1A1A1A" stroke="#f59e0b" stroke-width="2" filter="url(#glow)"/>
    <text x="400" y="190" fill="#f59e0b" font-family="sans-serif" font-size="14" font-weight="black" text-anchor="middle">ORCHESTRATION HUB</text>
    
    <rect x="270" y="210" width="260" height="30" rx="6" fill="#0A0A0A" stroke="#f59e0b" stroke-opacity="0.3"/>
    <text x="400" y="230" fill="#AAAAAA" font-family="monospace" font-size="8" text-anchor="middle">n8n Event-Driven Loop</text>
    
    <rect x="270" y="250" width="260" height="30" rx="6" fill="#0A0A0A" stroke="#f59e0b" stroke-opacity="0.3"/>
    <text x="400" y="270" fill="#AAAAAA" font-family="monospace" font-size="8" text-anchor="middle">AI Review (Llama 3)</text>
  </g>

  <!-- ACTIONS -->
  <g>
    <rect x="630" y="100" width="140" height="50" rx="8" fill="#1A1A1A" stroke="#f59e0b" stroke-opacity="0.2"/>
    <text x="700" y="130" fill="#FFFFFF" font-family="sans-serif" font-size="9" text-anchor="middle">GitHub Pull Request</text>
    
    <rect x="630" y="225" width="140" height="50" rx="8" fill="#1A1A1A" stroke="#f59e0b" stroke-opacity="0.2"/>
    <text x="700" y="255" fill="#FFFFFF" font-family="sans-serif" font-size="9" text-anchor="middle">Slack Executive Brief</text>
    
    <rect x="630" y="350" width="140" height="50" rx="8" fill="#1A1A1A" stroke="#f59e0b" stroke-opacity="0.2"/>
    <text x="700" y="380" fill="#FFFFFF" font-family="sans-serif" font-size="9" text-anchor="middle">Internal Wiki Sync</text>
  </g>

  <path d="M170 250 H250" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="4 2"/>
  <path d="M550 250 L630 125" stroke="#f59e0b" stroke-width="1" opacity="0.3"/>
  <path d="M550 250 L630 250" stroke="#f59e0b" stroke-width="1" opacity="0.3"/>
  <path d="M550 250 L630 375" stroke="#f59e0b" stroke-width="1" opacity="0.3"/>

  <text x="400" y="470" fill="#444" font-family="sans-serif" font-size="10" text-anchor="middle" letter-spacing="0.2em">ENTERPRISE EVENT-DRIVEN AUTOMATION INFRASTRUCTURE</text>
</svg>
