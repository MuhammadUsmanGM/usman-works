  </g>

  <path d="M190 250 H250" stroke="#bc8cff" stroke-width="1.5" stroke-dasharray="4 4"/>
  <path d="M550 250 H610" stroke="#bc8cff" stroke-width="2"/>

  <text x="400" y="480" fill="#444" font-family="sans-serif" font-size="10" text-anchor="middle" letter-spacing="0.2em">LOCAL-FIRST AUTONOMOUS AI EMPLOYEE ORCHESTRATOR</text>
