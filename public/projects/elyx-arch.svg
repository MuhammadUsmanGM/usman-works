    <text x="120" y="150" fill="#bc8cff" font-family="monospace" font-size="8" text-anchor="middle">Multi-Platform Monitor</text>
    
    <circle cx="120" cy="200" r="15" fill="#1A1A1A" stroke="#bc8cff" opacity="0.5"/>
    <circle cx="120" cy="250" r="15" fill="#1A1A1A" stroke="#bc8cff" opacity="0.5"/>
    <circle cx="120" cy="300" r="15" fill="#1A1A1A" stroke="#bc8cff" opacity="0.5"/>
