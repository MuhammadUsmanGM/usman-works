<svg width="800" height="500" viewBox="0 0 800 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="grad_emerald" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(400 250) rotate(90) scale(300 480)">
      <stop stop-color="#10b981" stop-opacity="0.1"/>
      <stop offset="1" stop-color="#0A0A0A" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <rect width="800" height="500" fill="#0A0A0A"/>
  <rect width="800" height="500" fill="url(#grad_emerald)"/>

  <!-- CENTRAL PULSE -->
  <g filter="url(#glow)">
    <circle cx="400" cy="250" r="120" fill="none" stroke="#10b981" stroke-width="0.5" opacity="0.3"/>
    <circle cx="400" cy="250" r="90" fill="none" stroke="#10b981" stroke-width="1" opacity="0.5"/>
    <circle cx="400" cy="250" r="60" fill="none" stroke="#10b981" stroke-width="2" opacity="0.8"/>
    
    <!-- Pulse indicators -->
    <path d="M300 250 H500" stroke="#10b981" stroke-width="1" stroke-dasharray="1 4" opacity="0.4"/>
    <path d="M400 150 V350" stroke="#10b981" stroke-width="1" stroke-dasharray="1 4" opacity="0.4"/>
  </g>

  <!-- FEATURES -->
  <g>
    <rect x="50" y="80" width="180" height="60" rx="12" fill="#1A1A1A" stroke="#10b981" stroke-opacity="0.4"/>
    <text x="140" y="110" fill="#FFFFFF" font-family="sans-serif" font-size="11" font-weight="bold" text-anchor="middle">WHISPER STT</text>
    <text x="140" y="130" fill="#10b981" font-family="monospace" font-size="8" text-anchor="middle">Neural VAD Intelligence</text>

    <rect x="570" y="80" width="180" height="60" rx="12" fill="#1A1A1A" stroke="#10b981" stroke-opacity="0.4"/>
    <text x="660" y="110" fill="#FFFFFF" font-family="sans-serif" font-size="11" font-weight="bold" text-anchor="middle">CANVAS PARTICLES</text>
    <text x="660" y="130" fill="#10b981" font-family="monospace" font-size="8" text-anchor="middle">2,000+ Synchronized Nodes</text>

    <rect x="570" y="360" width="180" height="60" rx="12" fill="#1A1A1A" stroke="#10b981" stroke-opacity="0.4"/>
    <text x="660" y="390" fill="#FFFFFF" font-family="sans-serif" font-size="11" font-weight="bold" text-anchor="middle">HYBRID REASONING</text>
    <text x="660" y="410" fill="#10b981" font-family="monospace" font-size="8" text-anchor="middle">Gemini Pro / GPT-4o</text>
  </g>

  <text x="400" y="470" fill="#444" font-family="sans-serif" font-size="10" text-anchor="middle" letter-spacing="0.2em">HOLOGRAPHIC LIQUID-MORPHIC NEURAL INTERFACE</text>
</svg>
