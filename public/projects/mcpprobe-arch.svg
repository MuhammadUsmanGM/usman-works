<svg width="800" height="400" viewBox="0 0 800 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="400" rx="12" fill="#0A0A0F"/>
  
  <!-- Grid Lines -->
  <path d="M0 100H800M0 200H800M0 300H800M100 0V400M200 0V400M300 0V400M400 0V400M500 0V400M600 0V400M700 0V400" stroke="#1A1A2E" stroke-width="0.5"/>

  <!-- Core Process -->
  <g filter="url(#glow)">
    <!-- Input -->
    <rect x="50" y="160" width="140" height="80" rx="8" fill="#1A1A2E" stroke="#8B5CF6" stroke-width="2"/>
    <text x="120" y="195" fill="#E2E8F0" font-family="monospace" font-size="14" text-anchor="middle">INPUT</text>
    <text x="120" y="215" fill="#8B5CF6" font-family="monospace" font-size="10" text-anchor="middle">CLI / SERVER URL</text>

    <!-- Arrow 1 -->
    <path d="M190 200H250" stroke="#8B5CF6" stroke-width="2" marker-end="url(#arrowhead)"/>

    <!-- Discovery & Transport -->
    <rect x="250" y="140" width="180" height="120" rx="8" fill="#1A1A2E" stroke="#10B981" stroke-width="2"/>
    <text x="340" y="175" fill="#E2E8F0" font-family="monospace" font-size="14" text-anchor="middle">MCP INSPECTOR</text>
    <text x="340" y="195" fill="#10B981" font-family="monospace" font-size="10" text-anchor="middle">TRANSPORT: STDIO/SSE</text>
    <text x="340" y="215" fill="#10B981" font-family="monospace" font-size="10" text-anchor="middle">CAPABILITY DISCOVERY</text>

    <!-- Arrow 2 -->
    <path d="M430 200H490" stroke="#10B981" stroke-width="2" marker-end="url(#arrowhead)"/>

    <!-- Analysis Engine -->
    <rect x="490" y="140" width="180" height="120" rx="8" fill="#1A1A2E" stroke="#F5A623" stroke-width="2"/>
    <text x="580" y="175" fill="#E2E8F0" font-family="monospace" font-size="14" text-anchor="middle">ANALYSIS CORE</text>
    <text x="580" y="195" fill="#F5A623" font-family="monospace" font-size="10" text-anchor="middle">SCHEMA VALIDATION</text>
    <text x="580" y="215" fill="#F5A623" font-family="monospace" font-size="10" text-anchor="middle">HEALTH SCORING (0-100)</text>

    <!-- Output Paths -->
    <path d="M670 180H720V120H750" stroke="#E2E8F0" stroke-width="1.5" marker-end="url(#arrowhead-small)"/>
    <text x="730" y="110" fill="#E2E8F0" font-family="monospace" font-size="10" text-anchor="start">JSON REPORT</text>
    
    <path d="M670 200H750" stroke="#E2E8F0" stroke-width="1.5" marker-end="url(#arrowhead-small)"/>
    <text x="730" y="195" fill="#E2E8F0" font-family="monospace" font-size="10" text-anchor="start">CLIENT CONFIG</text>

    <path d="M670 220H720V280H750" stroke="#E2E8F0" stroke-width="1.5" marker-end="url(#arrowhead-small)"/>
    <text x="730" y="275" fill="#E2E8F0" font-family="monospace" font-size="10" text-anchor="start">CLI DASHBOARD</text>
  </g>

  <!-- Definitions -->
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8B5CF6" />
    </marker>
    <marker id="arrowhead-small" markerWidth="6" markerHeight="4" refX="0" refY="2" orient="auto">
      <polygon points="0 0, 6 2, 0 4" fill="#E2E8F0" />
    </marker>
  </defs>
</svg>
