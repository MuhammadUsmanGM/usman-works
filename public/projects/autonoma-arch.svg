<svg width="800" height="500" viewBox="0 0 800 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="grad_gold" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(400 250) rotate(90) scale(300 480)">
      <stop stop-color="#C9960C" stop-opacity="0.1"/>
      <stop offset="1" stop-color="#0A0A0A" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#C9960C" />
    </marker>
  </defs>

  <rect width="800" height="500" fill="#0A0A0A"/>
  <rect width="800" height="500" fill="url(#grad_gold)"/>

  <!-- CHANNEL GATEWAY -->
  <g>
    <text x="100" y="60" fill="#C9960C" font-family="monospace" font-size="10" font-weight="bold" letter-spacing="0.2em">MULTI-CHANNEL GATEWAY</text>
    <rect x="30" y="80" width="140" height="40" rx="8" fill="#1A1A1A" stroke="#C9960C" stroke-opacity="0.3"/>
    <text x="100" y="105" fill="#FFFFFF" font-family="sans-serif" font-size="11" text-anchor="middle">WHATSAPP / GMAIL</text>
    <rect x="30" y="130" width="140" height="40" rx="8" fill="#1A1A1A" stroke="#C9960C" stroke-opacity="0.3"/>
    <text x="100" y="155" fill="#FFFFFF" font-family="sans-serif" font-size="11" text-anchor="middle">DISCORD / API</text>
  </g>

  <!-- AGENT CORTEX -->
  <g filter="url(#glow)">
    <rect x="250" y="80" width="300" height="340" rx="24" fill="#1A1A1A" stroke="#C9960C" stroke-width="2"/>
    <text x="400" y="115" fill="#C9960C" font-family="sans-serif" font-size="18" font-weight="black" text-anchor="middle">THE AUTONOMA CORTEX</text>
    <rect x="280" y="150" width="240" height="40" rx="10" fill="#0A0A0A" stroke="#C9960C" stroke-opacity="0.4"/>
    <text x="400" y="175" fill="#FFFFFF" font-family="sans-serif" font-size="11" font-weight="bold" text-anchor="middle">1. Intent Decoding &amp; Retrieval</text>
    <rect x="280" y="200" width="240" height="40" rx="10" fill="#0A0A0A" stroke="#C9960C" stroke-opacity="0.4"/>
    <text x="400" y="225" fill="#FFFFFF" font-family="sans-serif" font-size="11" font-weight="bold" text-anchor="middle">2. Strategic Task Planning</text>
    <rect x="280" y="250" width="240" height="40" rx="10" fill="#C9960C" fill-opacity="0.1" stroke="#C9960C"/>
    <text x="400" y="275" fill="#C9960C" font-family="sans-serif" font-size="11" font-weight="bold" text-anchor="middle">3. Tool Execution Sandbox</text>
    <rect x="280" y="300" width="240" height="40" rx="10" fill="#0A0A0A" stroke="#C9960C" stroke-opacity="0.4"/>
    <text x="400" y="325" fill="#FFFFFF" font-family="sans-serif" font-size="11" font-weight="bold" text-anchor="middle">4. Observation &amp; Reflection</text>
    <circle cx="400" cy="375" r="20" fill="#C9960C" fill-opacity="0.2" stroke="#C9960C" stroke-dasharray="2 2"/>
    <text x="400" y="378" fill="#C9960C" font-family="monospace" font-size="8" text-anchor="middle">MEMORY</text>
  </g>

  <!-- WORLD / TOOLS -->
  <g>
    <text x="700" y="60" fill="#C9960C" font-family="monospace" font-size="10" font-weight="bold" letter-spacing="0.2em">TOOLSET</text>
    <rect x="630" y="80" width="140" height="40" rx="8" fill="#1A1A1A" stroke="#C9960C" stroke-opacity="0.3"/>
    <text x="700" y="105" fill="#FFFFFF" font-family="sans-serif" font-size="11" text-anchor="middle">WEB SEARCH</text>
    <rect x="630" y="130" width="140" height="40" rx="8" fill="#1A1A1A" stroke="#C9960C" stroke-opacity="0.3"/>
    <text x="700" y="155" fill="#FFFFFF" font-family="sans-serif" font-size="11" text-anchor="middle">SHELL / OS</text>
    <rect x="630" y="180" width="140" height="40" rx="8" fill="#1A1A1A" stroke="#C9960C" stroke-opacity="0.3"/>
    <text x="700" y="205" fill="#FFFFFF" font-family="sans-serif" font-size="11" text-anchor="middle">BDB / SQL</text>
  </g>

  <!-- Connectors -->
  <path d="M170 115 H250" stroke="#C9960C" stroke-width="1.5" stroke-dasharray="4 4" opacity="0.4"/>
  <path d="M550 270 H630" stroke="#C9960C" stroke-width="2" marker-end="url(#arrowhead)"/>

  <text x="400" y="475" fill="#444" font-family="sans-serif" font-size="10" text-anchor="middle" letter-spacing="0.15em">AUTONOMOUS MULTI-AGENT ORCHESTRATION ENGINE</text>
</svg>
