<svg width="800" height="400" viewBox="0 0 800 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="400" rx="12" fill="#0A0A0F"/>
  
  <!-- Grid Lines -->
  <path d="M0 100H800M0 200H800M0 300H800M100 0V400M200 0V400M300 0V400M400 0V400M500 0V400M600 0V400M700 0V400" stroke="#1A1A2E" stroke-width="0.5"/>

  <!-- Core Process -->
  <g filter="url(#glow)">
    <!-- USB Entry -->
    <rect x="50" y="150" width="120" height="100" rx="8" fill="#1A1A2E" stroke="#3178C6" stroke-width="2"/>
    <text x="110" y="190" fill="#E2E8F0" font-family="monospace" font-size="14" text-anchor="middle">USB DRIVE</text>
    <text x="110" y="210" fill="#3178C6" font-family="monospace" font-size="10" text-anchor="middle">EXFAT STORAGE</text>

    <!-- Arrow 1 -->
    <path d="M170 200H230" stroke="#3178C6" stroke-width="2" marker-end="url(#arrowhead)"/>

    <!-- CLI Orchestrator -->
    <rect x="230" y="130" width="180" height="140" rx="8" fill="#1A1A2E" stroke="#10B981" stroke-width="2"/>
    <text x="320" y="170" fill="#E2E8F0" font-family="monospace" font-size="14" text-anchor="middle">CLI ENGINE</text>
    <text x="320" y="190" fill="#10B981" font-family="monospace" font-size="10" text-anchor="middle">CROSS-OS DEPLOY</text>
    <text x="320" y="210" fill="#10B981" font-family="monospace" font-size="10" text-anchor="middle">ASSET ORCHESTRATION</text>

    <!-- Arrow 2 -->
    <path d="M410 200H470" stroke="#10B981" stroke-width="2" marker-end="url(#arrowhead)"/>

    <!-- Runtime Layer -->
    <rect x="470" y="130" width="200" height="140" rx="8" fill="#1A1A2E" stroke="#F5A623" stroke-width="2"/>
    <text x="570" y="170" fill="#E2E8F0" font-family="monospace" font-size="14" text-anchor="middle">ISOLATED RUNTIME</text>
    <text x="570" y="190" fill="#F5A623" font-family="monospace" font-size="10" text-anchor="middle">OLLAMA ENGINE</text>
    <text x="570" y="210" fill="#F5A623" font-family="monospace" font-size="10" text-anchor="middle">ANYTHINGLLM UI</text>

    <!-- OS Targets -->
    <path d="M670 180H720V120H750" stroke="#E2E8F0" stroke-width="1.5" marker-end="url(#arrowhead-small)"/>
    <text x="735" y="110" fill="#E2E8F0" font-family="monospace" font-size="10" text-anchor="start">WINDOWS (.BAT)</text>
    
    <path d="M670 220H720V280H750" stroke="#E2E8F0" stroke-width="1.5" marker-end="url(#arrowhead-small)"/>
    <text x="735" y="275" fill="#E2E8F0" font-family="monospace" font-size="10" text-anchor="start">MACOS (.COMMAND)</text>
  </g>

  <!-- Definitions -->
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3178C6" />
    </marker>
    <marker id="arrowhead-small" markerWidth="6" markerHeight="4" refX="0" refY="2" orient="auto">
      <polygon points="0 0, 6 2, 0 4" fill="#E2E8F0" />
    </marker>
  </defs>
</svg>
