<svg width="800" height="500" viewBox="0 0 800 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="grad_gold" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(400 250) rotate(90) scale(300 480)">
      <stop stop-color="#C9960C" stop-opacity="0.1"/>
      <stop offset="1" stop-color="#0A0A0A" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#C9960C" />
    </marker>
  </defs>

  <rect width="800" height="500" fill="#0A0A0A"/>
  <rect width="800" height="500" fill="url(#grad_gold)"/>

  <!-- AI AGENTS -->
  <g>
    <rect x="40" y="80" width="160" height="40" rx="8" fill="#1A1A1A" stroke="#C9960C" stroke-opacity="0.3"/>
    <text x="120" y="105" fill="#FFFFFF" font-family="sans-serif" font-size="11" text-anchor="middle">CLAUDE / CURSOR</text>
    <rect x="40" y="130" width="160" height="40" rx="8" fill="#1A1A1A" stroke="#C9960C" stroke-opacity="0.3"/>
    <text x="120" y="155" fill="#FFFFFF" font-family="sans-serif" font-size="11" text-anchor="middle">GEMINI / QWEN</text>
  </g>

  <!-- THE MCP HUB -->
  <g filter="url(#glow)">
    <rect x="300" y="80" width="220" height="340" rx="20" fill="#1A1A1A" stroke="#C9960C" stroke-width="2"/>
    <text x="410" y="115" fill="#C9960C" font-family="sans-serif" font-size="18" font-weight="black" text-anchor="middle">PROMPTLY</text>
    
    <rect x="320" y="170" width="180" height="50" rx="10" fill="#0A0A0A" stroke="#C9960C" stroke-opacity="0.4"/>
    <text x="410" y="195" fill="#FFFFFF" font-family="sans-serif" font-size="10" font-weight="bold" text-anchor="middle">AST Project Mapping</text>
    <rect x="320" y="240" width="180" height="50" rx="10" fill="#0A0A0A" stroke="#C9960C" stroke-opacity="0.4"/>
    <text x="410" y="265" fill="#FFFFFF" font-family="sans-serif" font-size="10" font-weight="bold" text-anchor="middle">Context Injection</text>

    <rect x="310" y="320" width="200" height="80" rx="12" fill="#C9960C" fill-opacity="0.1" stroke="#C9960C" stroke-dasharray="4 2"/>
    <text x="410" y="350" fill="#C9960C" font-family="sans-serif" font-size="11" font-weight="bold" text-anchor="middle">ENRICHED DATASTREAM</text>
  </g>

  <!-- LOCAL SOURCE -->
  <g>
    <rect x="600" y="150" width="160" height="200" rx="16" fill="#1A1A1A" stroke="#C9960C" stroke-opacity="0.3"/>
    <text x="680" y="180" fill="#FFFFFF" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">FILE SYSTEM</text>
  </g>

  <path d="M520 250 H600" stroke="#C9960C" stroke-width="2" marker-end="url(#arrowhead)"/>

  <text x="400" y="470" fill="#444" font-family="sans-serif" font-size="10" text-anchor="middle" letter-spacing="0.2em">UNIVERSAL AI-CONTEXT INFRASTRUCTURE</text>
</svg>
