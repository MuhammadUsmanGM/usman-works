  </g>

  <text x="400" y="475" fill="#444" font-family="sans-serif" font-size="10" text-anchor="middle" letter-spacing="0.2em">CODEBASE DEBT AUDIT &amp; INTELLIGENT TRIAGE TOOL</text>
