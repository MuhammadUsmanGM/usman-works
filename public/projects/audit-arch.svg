      <stop stop-color="#f59e0b" stop-opacity="0.1"/>
      <stop offset="1" stop-color="#0A0A0A" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="800" height="500" fill="#0A0A0A"/>
  <rect width="800" height="500" fill="url(#grad_debt)"/>

  <!-- SCANNER ENGINE -->
  <g>
    <rect x="250" y="50" width="300" height="120" rx="20" fill="#1A1A1A" stroke="#f59e0b" stroke-width="2"/>
    <text x="400" y="95" fill="#f59e0b" font-family="sans-serif" font-size="18" font-weight="black" text-anchor="middle">TODO-AUDIT ENGINE</text>
    <text x="400" y="120" fill="#AAAAAA" font-family="monospace" font-size="9" text-anchor="middle">Automated Technical Debt Discovery</text>
    
    <path d="M300 145 H500" stroke="#f59e0b" stroke-width="1" opacity="0.3"/>
    <text x="400" y="155" fill="#f59e0b" font-family="monospace" font-size="8" text-anchor="middle">SCANNING REPOSITORY...</text>
  </g>

  <!-- RADAR VISUAL -->
  <g>
    <circle cx="400" cy="320" r="100" fill="none" stroke="#f59e0b" stroke-width="0.5" opacity="0.2"/>
    <circle cx="400" cy="320" r="70" fill="none" stroke="#f59e0b" stroke-width="0.5" opacity="0.4"/>
    <circle cx="400" cy="320" r="40" fill="none" stroke="#f59e0b" stroke-width="1" opacity="0.6"/>
    
    <!-- Heatmap points -->
    <circle cx="350" cy="300" r="4" fill="#ef4444" opacity="0.8"/>
    <text x="330" y="300" fill="#ef4444" font-family="sans-serif" font-size="8" text-anchor="end">Stale Logic</text>
    
    <circle cx="450" cy="340" r="4" fill="#f59e0b" opacity="0.8"/>
