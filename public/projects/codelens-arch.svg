<svg width="800" height="500" viewBox="0 0 800 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="grad_blue" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(400 250) rotate(90) scale(300 480)">
      <stop stop-color="#C9960C" stop-opacity="0.1"/>
      <stop offset="1" stop-color="#0A0A0A" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <rect width="800" height="500" fill="#0A0A0A"/>
  <rect width="800" height="500" fill="url(#grad_blue)"/>

  <!-- PHASE 1: INGESTION -->
  <g>
    <rect x="30" y="80" width="140" height="70" rx="12" fill="#1A1A1A" stroke="#C9960C" stroke-opacity="0.4"/>
    <text x="100" y="110" fill="#FFFFFF" font-family="sans-serif" font-size="11" font-weight="bold" text-anchor="middle">REPO FETCH</text>
    <text x="100" y="130" fill="#C9960C" font-family="monospace" font-size="9" text-anchor="middle">GitHub / Local</text>
  </g>

  <path d="M170 115 H220" stroke="#C9960C" stroke-width="1.5" stroke-dasharray="3 3"/>

  <!-- PHASE 2: PROCESSING ENGINE -->
  <rect x="220" y="50" width="220" height="130" rx="20" fill="#1A1A1A" stroke="#C9960C" stroke-width="1.5"/>
  <text x="330" y="75" fill="#C9960C" font-family="sans-serif" font-size="12" font-weight="black" text-anchor="middle">NEURAL SYNTHESIS</text>
  
  <rect x="240" y="90" width="180" height="30" rx="6" fill="#0A0A0A" stroke="#C9960C" stroke-opacity="0.3"/>
  <text x="330" y="110" fill="#AAAAAA" font-family="monospace" font-size="9" text-anchor="middle">AST Parsing (40+ Lang)</text>
  
  <rect x="240" y="130" width="180" height="30" rx="6" fill="#C9960C" fill-opacity="0.1" stroke="#C9960C" stroke-opacity="0.5"/>
  <text x="330" y="150" fill="#C9960C" font-family="monospace" font-size="9" text-anchor="middle">Gemini Embedding</text>

  <!-- PHASE 3: VECTOR STORE -->
  <g filter="url(#glow)">
    <circle cx="600" cy="115" r="50" fill="#1A1A1A" stroke="#C9960C" stroke-width="2"/>
    <text x="600" y="115" fill="#C9960C" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">QDRANT</text>
    <text x="600" y="130" fill="#AAAAAA" font-family="monospace" font-size="8" text-anchor="middle">Vector DNA</text>
  </g>

  <path d="M440 115 H550" stroke="#C9960C" stroke-width="2" opacity="0.6"/>

  <!-- PHASE 4: SEMANTIC DIALOGUE -->
  <rect x="220" y="280" width="380" height="140" rx="24" fill="#1A1A1A" stroke="#C9960C" stroke-width="2"/>
  <text x="410" y="310" fill="#C9960C" font-family="sans-serif" font-size="14" font-weight="black" text-anchor="middle">HYBRID RAG CHAT</text>

  <!-- User Input Block -->
  <rect x="240" y="330" width="150" height="50" rx="10" fill="#0A0A0A" stroke="#C9960C" stroke-opacity="0.3"/>
  <text x="315" y="350" fill="#FFFFFF" font-family="sans-serif" font-size="9" text-anchor="middle">USER QUERY</text>
  
  <rect x="430" y="330" width="150" height="50" rx="10" fill="#C9960C" fill-opacity="0.1" stroke="#C9960C"/>
  <text x="505" y="350" fill="#C9960C" font-family="sans-serif" font-size="9" font-weight="bold" text-anchor="middle">GEMINI RESPONSE</text>

  <text x="400" y="470" fill="#444" font-family="sans-serif" font-size="10" text-anchor="middle" letter-spacing="0.2em">REPOSITORY-SCALE COGNITIVE LAYER</text>
</svg>
