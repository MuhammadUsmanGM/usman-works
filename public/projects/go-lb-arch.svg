<svg width="800" height="500" viewBox="0 0 800 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="grad_cyan" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(400 250) rotate(90) scale(300 480)">
      <stop stop-color="#22d3ee" stop-opacity="0.1"/>
      <stop offset="1" stop-color="#0A0A0A" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <rect width="800" height="500" fill="#0A0A0A"/>
  <rect width="800" height="500" fill="url(#grad_cyan)"/>

  <!-- INGRESS -->
  <g>
    <path d="M50 250 Q100 250 150 250" stroke="#22d3ee" stroke-width="3" stroke-dasharray="10 5" opacity="0.6"/>
    <text x="70" y="240" fill="#22d3ee" font-family="monospace" font-size="10" font-weight="bold">L7 INGRESS</text>
  </g>

  <!-- THE BALANCER HUB -->
  <g filter="url(#glow)">
    <rect x="250" y="100" width="300" height="300" rx="24" fill="#1A1A1A" stroke="#22d3ee" stroke-width="2"/>
    <text x="400" y="140" fill="#22d3ee" font-family="sans-serif" font-size="16" font-weight="black" text-anchor="middle">GO LOAD BALANCER</text>
    
    <!-- Health Check Heartbeat -->
    <path d="M300 350 Q325 320 350 350 T400 350 T450 350 T500 350" stroke="#22d3ee" stroke-width="1.5" opacity="0.4"/>
    <text x="400" y="375" fill="#AAAAAA" font-family="monospace" font-size="9" text-anchor="middle">Health Monitor Active</text>

    <!-- Strategies -->
    <rect x="280" y="180" width="240" height="100" rx="12" fill="#0A0A0A" stroke="#22d3ee" stroke-opacity="0.3"/>
    <text x="400" y="210" fill="#FFFFFF" font-family="sans-serif" font-size="10" font-weight="bold" text-anchor="middle">Multi-Strategy Router</text>
    <text x="400" y="235" fill="#22d3ee" font-family="monospace" font-size="8" text-anchor="middle">Round-Robin / Least-Conn / IP-Hash</text>
  </g>

  <!-- BACKEND FAN-OUT -->
  <g>
    <path d="M550 250 L650 150" stroke="#22d3ee" stroke-width="1.5" opacity="0.4"/>
    <path d="M550 250 L650 250" stroke="#22d3ee" stroke-width="1.5" opacity="0.4"/>
    <path d="M550 250 L650 350" stroke="#22d3ee" stroke-width="1.5" opacity="0.4"/>
    
    <rect x="660" y="130" width="100" height="40" rx="8" fill="#1A1A1A" stroke="#22d3ee" stroke-opacity="0.2"/>
    <text x="710" y="155" fill="#FFFFFF" font-family="sans-serif" font-size="9" text-anchor="middle">Server Alpha</text>
    
    <rect x="660" y="230" width="100" height="40" rx="8" fill="#1A1A1A" stroke="#22d3ee" stroke-opacity="0.2"/>
    <text x="710" y="255" fill="#FFFFFF" font-family="sans-serif" font-size="9" text-anchor="middle">Server Beta</text>
    
    <rect x="660" y="330" width="100" height="40" rx="8" fill="#1A1A1A" stroke="#22d3ee" stroke-opacity="0.2" stroke-dasharray="2 2"/>
    <text x="710" y="355" fill="#AAAAAA" font-family="sans-serif" font-size="9" text-anchor="middle">Auto-Scaled</text>
  </g>

  <text x="400" y="470" fill="#444" font-family="sans-serif" font-size="10" text-anchor="middle" letter-spacing="0.2em">HIGH-AVAILABILITY NETWORK ORCHESTRATION</text>
</svg>
