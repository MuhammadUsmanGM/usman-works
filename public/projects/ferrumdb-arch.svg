<svg width="800" height="500" viewBox="0 0 800 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="grad_gold" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(400 250) rotate(90) scale(300 480)">
      <stop stop-color="#C9960C" stop-opacity="0.05"/>
      <stop offset="1" stop-color="#0A0A0A" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <rect width="800" height="500" fill="#0A0A0A"/>
  <rect width="800" height="500" fill="url(#grad_gold)"/>

  <!-- INTERACTION LAYER -->
  <g filter="url(#glow)">
    <rect x="250" y="60" width="300" height="50" rx="8" fill="#1A1A1A" stroke="#C9960C" stroke-opacity="0.5"/>
    <text x="400" y="90" fill="#FFFFFF" font-family="sans-serif" font-size="12" text-anchor="middle">Rust Binaries (NAPI / PyO3)</text>
  </g>

  <!-- MEMORY LAYER -->
  <rect x="200" y="180" width="400" height="80" rx="12" fill="#1A1A1A" stroke="#C9960C" stroke-width="2"/>
  <text x="400" y="210" fill="#C9960C" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">Bitcask-Style Hash Table</text>
  <text x="400" y="235" fill="#AAAAAA" font-family="monospace" font-size="9" text-anchor="middle">O(1) Memory Index</text>

  <!-- STORAGE LAYER -->
  <g>
    <rect x="200" y="340" width="280" height="100" rx="12" fill="#1A1A1A" stroke="#C9960C" stroke-opacity="0.5"/>
    <text x="340" y="370" fill="#FFFFFF" font-family="sans-serif" font-size="12" text-anchor="middle">Immutable Data Log</text>
    <text x="340" y="395" fill="#C9960C" font-family="monospace" font-size="8" text-anchor="middle">APPEND ONLY</text>
  </g>

  <!-- CRYPTO ENGINE -->
  <g filter="url(#glow)">
    <rect x="500" y="340" width="100" height="100" rx="12" fill="#C9960C" fill-opacity="0.1" stroke="#C9960C" stroke-width="2"/>
    <text x="550" y="400" fill="#C9960C" font-family="sans-serif" font-size="10" font-weight="bold" text-anchor="middle">AES-256-GCM</text>
  </g>

  <text x="400" y="475" fill="#444" font-family="sans-serif" font-size="10" text-anchor="middle" letter-spacing="0.2em">HIGH-PERFORMANCE RUST STORAGE ENGINE</text>
</svg>
